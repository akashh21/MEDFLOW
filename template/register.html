{% extends 'base.html' %}

{% block title %}Register {{ role }} - MedFlow{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="card auth-card">
        <h2>{{ role }} Registration</h2>
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label for="username" class="form-label">Username</label>
                <input type="text" id="username" name="username" class="form-control" required placeholder="Choose a username">
            </div>
            <div class="form-group">
                <label for="email" class="form-label">Email</label>
                <input type="email" id="email" name="email" class="form-control" required placeholder="Enter your email">
            </div>
            
            {% if role == 'Doctor' %}
            <div class="form-group">
                <label for="doctor_name" class="form-label">Full Name</label>
                <input type="text" id="doctor_name" name="doctor_name" class="form-control" required placeholder="Dr. John Doe">
            </div>
            <div class="form-group">
                <label for="specialization" class="form-label">Specialization</label>
                <input type="text" id="specialization" name="specialization" class="form-control" required placeholder="e.g. Cardiologist">
            </div>
            {% endif %}

            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" name="password" class="form-control" required placeholder="Choose a password">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Register</button>
        </form>
        <p class="text-center mt-4 text-muted">
            Already have an account? <a href="{% url 'login' %}">Login here</a>
        </p>
    </div>
</div>
{% endblock %}
