{% extends 'base.html' %}

{% block title %}Login - MedFlow{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="card auth-card">
        <h2>Welcome Back</h2>
        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="form-group">
                <label for="username" class="form-label">Username</label>
                <input type="text" id="username" name="username" class="form-control" required placeholder="Enter your username">
            </div>
            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" name="password" class="form-control" required placeholder="Enter your password">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
        </form>
        <p class="text-center mt-4 text-muted">
            Don't have an account? <br>
            <a href="{% url 'register_patient' %}">Register as Patient</a> or 
            <a href="{% url 'register_doctor' %}">Register as Doctor</a>
        </p>
    </div>
</div>
{% endblock %}
