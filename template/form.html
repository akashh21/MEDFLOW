{% extends 'base.html' %}

{% block title %}Book Appointment - MedFlow{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="card" style="width: 100%; max-width: 600px;">
        <h2 style="margin-bottom: 1.5rem; text-align: center;">Book an Appointment</h2>
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="patient_name" class="form-label">Patient Name</label>
                <input type="text" id="patient_name" name="patient_name" class="form-control" required placeholder="Enter full name">
            </div>
            
            <div class="grid grid-cols-2">
                <div class="form-group">
                    <label for="age" class="form-label">Age</label>
                    <input type="number" id="age" name="age" class="form-control" required min="10" placeholder="e.g. 35">
                </div>
                <div class="form-group">
                    <label for="appointment_date" class="form-label">Appointment Date</label>
                    <input type="date" id="appointment_date" name="appointment_date" class="form-control" required>
                </div>
            </div>

            <div class="form-group">
                <label for="doctor_name" class="form-label">Select Doctor</label>
                <select id="doctor_name" name="doctor_name" class="form-control" required>
                    <option value="" disabled selected>Choose a specialist...</option>
                    {% for doctor in Doctor %}
                        <option value="{{ doctor.id }}" {% if doctor.is_on_leave %}disabled{% endif %}>
                            {{ doctor.doctor_name }} ({{ doctor.specialization }}) {% if doctor.is_on_leave %}- On Leave{% endif %}
                        </option>
                    {% endfor %}
                </select>
            </div>
            
            <button type="submit" class="btn btn-primary mt-4" style="width: 100%;">Confirm Booking</button>
        </form>
    </div>
</div>

<script>
    // Set the minimum date of the date picker to today
    const today = new Date().toISOString().split('T')[0];
    document.getElementById("appointment_date").setAttribute("min", today);
</script>
{% endblock %}
